# Workload volontairement vulnérable — sert uniquement à déclencher
# Falco (runtime) / Trivy (image + config) pendant la démo.
# Pas de securityContext.privileged: la ClusterPolicy Kyverno
# disallow-privileged-containers est en mode Enforce et bloquerait
# purement et simplement le déploiement (déjà démontré séparément
# avec un pod ad-hoc). Ce workload reste volontairement vulnérable
# via l'image taguée "latest", l'exécution root et le hostPath.
# Ne JAMAIS déployer ceci hors du cluster de démo.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-demo
  namespace: demo
  labels:
    app: vulnerable-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-demo
  template:
    metadata:
      labels:
        app: vulnerable-demo
    spec:
      containers:
        - name: app
          image: nginx:latest # tag flottant -> flag Trivy/Kubescape
          securityContext:
            runAsUser: 0 # root -> flag Falco/Trivy
          volumeMounts:
            - name: host-root
              mountPath: /host
      volumes:
        - name: host-root
          hostPath:
            path: /
      restartPolicy: Always
