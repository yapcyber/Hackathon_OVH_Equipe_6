apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: equipe-6
  source:
    repoURL: "https://falcosecurity.github.io/charts"
    chart: falco
    targetRevision: "9.1.0"
    helm:
      releaseName: falco
      valuesObject:
        driver:
          kind: modern_ebpf
          modernEbpf:
            leastPrivileged: true # capabilities ciblées (BPF/SYS_RESOURCE/PERFMON/SYS_PTRACE) au lieu de privileged:true, compatible avec la ClusterPolicy Kyverno
        falcosidekick:
          enabled: true
          config:
            webhook:
              address: "http://ai-remediation-webhook.remediation.svc.cluster.local:8080/webhook/falco"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
