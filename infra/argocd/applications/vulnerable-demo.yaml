apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vulnerable-demo
  namespace: argocd
spec:
  project: equipe-6
  source:
    repoURL: "https://github.com/yapcyber/Hackathon_OVH_Equipe_6.git"
    targetRevision: main
    path: apps/vulnerable-demo
  destination:
    server: "https://kubernetes.default.svc"
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
