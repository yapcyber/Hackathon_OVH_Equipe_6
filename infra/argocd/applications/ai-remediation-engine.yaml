apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-remediation-engine
  namespace: argocd
  annotations:
    # Le ServiceMonitor (k8s/servicemonitor.yaml) est un CRD fourni par
    # kube-prometheus-stack : on force ce sync après celui de Prometheus
    # (wave par défaut 0) pour éviter une erreur "no matches for kind
    # ServiceMonitor" au premier bootstrap du cluster.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: equipe-6
  source:
    repoURL: "https://github.com/yapcyber/Hackathon_OVH_Equipe_6.git"
    targetRevision: main
    path: ai-remediation-engine/k8s
  destination:
    server: "https://kubernetes.default.svc"
    namespace: remediation
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
