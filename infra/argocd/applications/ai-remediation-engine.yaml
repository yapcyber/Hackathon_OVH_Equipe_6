apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-remediation-engine
  namespace: argocd
spec:
  project: equipe-6
  source:
    repoURL: "https://github.com/<org>/Hackathon_OVH_Equipe_6.git"
    targetRevision: main
    path: ai-remediation-engine/k8s
  destination:
    server: "https://kubernetes.default.svc"
    namespace: remediation
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
