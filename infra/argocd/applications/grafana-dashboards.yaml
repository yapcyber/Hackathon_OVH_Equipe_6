# Dashboards custom (ConfigMaps labellées grafana_dashboard: "1", auto-
# importées par le sidecar Grafana — voir infra/prometheus/values.yaml).
# Application séparée de kube-prometheus-stack.yaml car sa source est un
# chart Helm distant : on ne peut pas y mélanger des manifestes locaux du
# dépôt sans passer par les "multiple sources", non utilisées ici.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-dashboards
  namespace: argocd
  annotations:
    # Le namespace `monitoring` et le sidecar Grafana doivent déjà exister
    # (créés par kube-prometheus-stack, wave par défaut 0).
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: equipe-6
  source:
    repoURL: "https://github.com/yapcyber/Hackathon_OVH_Equipe_6.git"
    targetRevision: main
    path: infra/prometheus/dashboards
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
