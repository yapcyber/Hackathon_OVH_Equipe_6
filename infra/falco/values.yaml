# Référence : consommé par infra/argocd/applications/falco.yaml (valuesObject inline).
# Conservé ici comme documentation / valeurs de secours pour un déploiement Helm manuel.
driver:
  kind: modern_ebpf
  modernEbpf:
    # Remplace securityContext.privileged: true par des capabilities Linux
    # ciblées (BPF, SYS_RESOURCE, PERFMON, SYS_PTRACE) — nécessaire pour que
    # Falco reste conforme à sa propre ClusterPolicy disallow-privileged-containers
    # (voir docs/DOSSIER_TECHNIQUE.md §6.3, incident déjà rencontré).
    leastPrivileged: true

falcosidekick:
  enabled: true
  config:
    webhook:
      address: "http://ai-remediation-webhook.remediation.svc.cluster.local:8080/webhook/falco"
      customHeaders: "X-Source: falco"
  webui:
    enabled: true
