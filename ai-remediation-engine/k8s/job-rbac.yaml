# RBAC du Job d'enrichissement/IA/PR.
# Droit UNIQUE : lecture seule (get/list/watch) sur les workloads, pour
# construire le contexte envoyé à l'IA. AUCUN verbe d'écriture
# (create/update/patch/delete) sur quoi que ce soit dans le cluster.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-remediation-job
  namespace: remediation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-remediation-job-readonly
rules:
  - apiGroups: ["", "apps", "batch"]
    resources: ["pods", "deployments", "replicasets", "jobs", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["wgpolicyk8s.io"]
    resources: ["policyreports", "clusterpolicyreports"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["aquasecurity.github.io"]
    resources: ["vulnerabilityreports", "configauditreports"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-remediation-job-readonly
subjects:
  - kind: ServiceAccount
    name: ai-remediation-job
    namespace: remediation
roleRef:
  kind: ClusterRole
  name: ai-remediation-job-readonly
  apiGroup: rbac.authorization.k8s.io
---
# Lecture du calendrier de code freeze (ConfigMap freeze-calendar), pour
# l'analyse de risque business. Volontairement un Role NAMESPACÉ (pas un
# ClusterRole) : le Job n'a besoin de lire des ConfigMaps que dans son propre
# namespace `remediation`, jamais ailleurs. Moindre privilège maintenu.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-remediation-job-configmaps
  namespace: remediation
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-remediation-job-configmaps
  namespace: remediation
subjects:
  - kind: ServiceAccount
    name: ai-remediation-job
    namespace: remediation
roleRef:
  kind: Role
  name: ai-remediation-job-configmaps
  apiGroup: rbac.authorization.k8s.io
