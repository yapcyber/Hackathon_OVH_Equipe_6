# Exemple — NE JAMAIS committer les vraies valeurs.
# Créer réellement via : kubectl create secret generic ... --from-literal=...
# ou un SealedSecret / External Secret en production.
apiVersion: v1
kind: Secret
metadata:
  name: ai-endpoints-credentials
  namespace: remediation
type: Opaque
stringData:
  token: "<OVH_AI_ENDPOINTS_ACCESS_TOKEN>"
---
apiVersion: v1
kind: Secret
metadata:
  name: git-pr-credentials
  namespace: remediation
type: Opaque
stringData:
  # Token scopé "pull-requests: write" UNIQUEMENT — jamais "contents: write"
  # sur la branche protégée, jamais de droit de merge/admin.
  token: "<GIT_PR_TOKEN>"
---
# Optionnel (durcissement, voir README) : secret partagé pour authentifier
# les appels à /webhook/*. Si absent, webhook_receiver.py démarre quand même
# (voir secretKeyRef optional: true dans webhook-deployment.yaml) mais logue
# un avertissement — la NetworkPolicy reste alors la seule défense.
# Après création, câbler la MÊME valeur côté émetteurs (hors GitOps, pour ne
# jamais committer ce secret en clair dans une Application) :
#   kubectl -n falco get deploy   # repérer le Deployment falcosidekick (pas un DaemonSet)
#   kubectl -n falco set env deployment/<falco-release>-falcosidekick \
#     WEBHOOK_CUSTOMHEADERS="X-Webhook-Token:<valeur>"
#   kubectl -n trivy-system set env deployment/trivy-operator \
#     OPERATOR_WEBHOOK_BROADCAST_CUSTOM_HEADERS="X-Webhook-Token:<valeur>"
apiVersion: v1
kind: Secret
metadata:
  name: webhook-shared-token
  namespace: remediation
type: Opaque
stringData:
  token: "<WEBHOOK_SHARED_TOKEN>"
