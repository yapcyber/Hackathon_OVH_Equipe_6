apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-remediation-webhook
  namespace: remediation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-remediation-webhook
  template:
    metadata:
      labels:
        app: ai-remediation-webhook
    spec:
      serviceAccountName: ai-remediation-webhook
      containers:
        - name: webhook
          image: ghcr.io/yapcyber/ai-remediation-engine:latest
          command: ["python", "-m", "uvicorn", "webhook_receiver:app", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: NAMESPACE
              value: remediation
            - name: JOB_IMAGE
              value: "ghcr.io/yapcyber/ai-remediation-engine:latest"
            - name: WEBHOOK_SHARED_TOKEN
              valueFrom:
                secretKeyRef:
                  name: webhook-shared-token
                  key: token
                  # optional: true -> le Deployment démarre même si ce Secret
                  # n'a pas encore été créé (durcissement opt-in, voir README).
                  optional: true
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-remediation-webhook
  namespace: remediation
  labels:
    app: ai-remediation-webhook
spec:
  selector:
    app: ai-remediation-webhook
  ports:
    - name: http
      port: 8080
      targetPort: http
